  /dashboard:
    get:
      summary: Aggregated dashboard
      description: >
        Returns aggregated counters and pending activity alerts according to the
        authenticated user's role. This is a read-only endpoint.
      tags: [Dashboard]
      responses:
        "200":
          description: Dashboard loaded successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - clients_count
                  - activities_count
                  - pending_activities_alerts
                properties:
                  clients_count:
                    type: integer
                    description: Number of clients visible to the authenticated user
                    example: 5
                  activities_count:
                    type: integer
                    description: Number of activities visible to the authenticated user
                    example: 12
                  pending_activities_alerts:
                    type: array
                    description: List of pending activity alerts
                    items:
                      type: object
                      required:
                        - clients_count
                        - activities_count
                        - activities_completed_this_month
                        - activities_pending
                        - activity_chart
                        - upcoming_activities
                      properties:
                        clients_count:
                          type: integer
                          example: 5
                        activities_count:
                          type: integer
                          example: 12
                        activities_completed_this_month:
                          type: integer
                          example: 3
                        activities_pending:
                          type: integer
                          example: 7
                        activity_chart:
                          type: array
                          items:
                            type: object
                            properties:
                              date: { type: string, format: date, example: "2026-03-01" }
                              count: { type: integer, example: 4 }
                        upcoming_activities:
                          type: array
                          items:
                            type: object
                            properties:
                              id: { type: integer, example: 1 }
                              title: { type: string, example: "Follow up call" }
                              date: { type: string, format: date, example: "2026-03-20" }
                              status: { type: string, example: "pending" }
        "401":
          description: Unauthorized - authentication token is missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /search:
    get:
      summary: Global search
      description: >
        Searches across clients, contacts and activities using a query string.
        Results are grouped by resource type and limited to 5 per group.
        Respects ownership rules — users see only their own records, admins see all.
        Returns empty arrays if the query parameter is missing or blank.
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: false
          schema: { type: string }
          example: "acme"
          description: Search term. Matched using LIKE against name/title fields.
      responses:
        "200":
          description: Search results grouped by resource type
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer, example: 1 }
                        name: { type: string, example: "Acme Corp" }
                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer, example: 1 }
                        name: { type: string, example: "Jaki Riggs" }
                        client_id: { type: integer, example: 1 }
                  activities:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer, example: 1 }
                        title: { type: string, example: "Follow up call" }
                        status: { type: string, example: "pending" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"